syntax = "proto3";

package product;

option go_package = "github.com/tickraft/taichi/examples/go-buggy-backend/proto/gen/product;productpb";

// ProductService manages the product catalog.
// Intentional bug: GetProduct returns a wrong price for product id=1.
service ProductService {
  // GetProduct returns a single product by id.
  rpc GetProduct(GetProductRequest) returns (Product);
  // ListProducts returns all products.
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse);
}

// InventoryService manages stock levels.
// Intentional bug: this service is declared in the proto but NOT implemented
// by the server, so gRPC reflection should report it as missing.
service InventoryService {
  // CheckStock returns the stock level for a product.
  rpc CheckStock(CheckStockRequest) returns (Stock);
}

message GetProductRequest {
  int32 id = 1;
}

message ListProductsRequest {
  int32 limit = 1;
}

message Product {
  int32 id = 1;
  string name = 2;
  double price = 3;
  string category = 4;
}

message ListProductsResponse {
  repeated Product items = 1;
  int32 total = 2;
}

message CheckStockRequest {
  int32 product_id = 1;
}

message Stock {
  int32 product_id = 1;
  int32 quantity = 2;
  string warehouse = 3;
}
