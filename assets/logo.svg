<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" width="512" height="512">
  <!-- 方案4 · 青绿双环：青色+翠绿双色环交错（编排轨道）+ 中心太极 -->
  <!-- 外环1：青色 270° 弧 -->
  <path d="M256,36 A220,220 0 1,1 36,256" stroke="#30B0C7" stroke-width="20" stroke-linecap="round" fill="none"/>
  <!-- 外环2：翠绿 270° 弧（反向偏移） -->
  <path d="M256,68 A188,188 0 1,0 444,256" stroke="#34C759" stroke-width="10" stroke-linecap="round" fill="none"/>
  <!-- 太极阴半 -->
  <circle cx="256" cy="256" r="148" fill="#1D1D1F"/>
  <path d="M256,108 A148,148 0 0,1 256,404 Z" fill="#F5F5F7"/>
  <circle cx="256" cy="182" r="74" fill="#F5F5F7"/>
  <circle cx="256" cy="330" r="74" fill="#1D1D1F"/>
  <!-- 阴眼：青色 -->
  <circle cx="256" cy="182" r="26" fill="#30B0C7"/>
  <!-- 阳眼：翠绿 -->
  <circle cx="256" cy="330" r="26" fill="#34C759"/>
</svg>
