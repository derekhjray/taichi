version: "2"

run:
  timeout: 5m
  go: "1.26.4"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - unconvert
    - prealloc
  settings:
    revive:
      severity: warning
      rules:
        - name: exported
          disabled: false
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes: github.com/tickraft/taichi
